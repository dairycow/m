# Cut a release by tagging: version in Cargo.toml must match the tag.
#   1. bump workspace.package.version
#   2. local checklist (DEVELOPMENT.md)
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
#
# Ships host + static musl `m` (bench containers). No live-model bench here.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tag matches Cargo version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "tag=$tag cargo=$ver"
          test "$tag" = "$ver"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: clippy

      - name: musl linker
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

      - name: build linux-gnu (tls)
        run: |
          cargo build --release -p m-tui -p m-bench
          mkdir -p dist
          cp target/release/m dist/m-x86_64-unknown-linux-gnu
          cp target/release/m-bench dist/m-bench-x86_64-unknown-linux-gnu

      - name: build linux-musl (static, no tls)
        run: |
          cargo build -p m-tui --release \
            --target x86_64-unknown-linux-musl \
            --no-default-features
          cp target/x86_64-unknown-linux-musl/release/m \
            dist/m-x86_64-unknown-linux-musl

      - name: checksums
        working-directory: dist
        run: sha256sum * | tee SHA256SUMS

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/m-x86_64-unknown-linux-gnu
            dist/m-x86_64-unknown-linux-musl
            dist/m-bench-x86_64-unknown-linux-gnu
            dist/SHA256SUMS
